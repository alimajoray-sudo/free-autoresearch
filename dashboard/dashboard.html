<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Autoresearch Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #1c2128; --border: #30363d;
    --text: #e6edf3; --muted: #848d97; --blue: #58a6ff; --green: #3fb950;
    --yellow: #d29922; --red: #f85149; --purple: #bc8cff; --orange: #f0883e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace; background: var(--bg); color: var(--text); font-size: 13px; }
  header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 16px; font-weight: 600; }
  .badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-green { background: #1a4d2e; color: var(--green); }
  .badge-red { background: #3d1a1a; color: var(--red); }
  .badge-yellow { background: #3d2d00; color: var(--yellow); }
  .badge-blue { background: #0d2545; color: var(--blue); }
  #last-update { margin-left: auto; color: var(--muted); font-size: 11px; }
  
  .main { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto 1fr; gap: 12px; padding: 12px; height: calc(100vh - 52px); }
  
  /* Budget bar */
  .budget-bar { grid-column: 1 / -1; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; display: flex; align-items: center; gap: 16px; }
  .budget-bar label { font-size: 11px; color: var(--muted); min-width: 80px; }
  .progress-wrap { flex: 1; background: var(--bg3); border-radius: 4px; height: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width 0.5s; }
  .progress-fill.warn { background: var(--yellow); }
  .progress-fill.over { background: var(--red); }
  .budget-num { font-size: 12px; font-weight: 600; min-width: 120px; text-align: right; }
  
  /* Projects grid */
  .projects-grid { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
  .proj-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: border-color 0.2s; }
  .proj-card:hover, .proj-card.active { border-color: var(--blue); }
  .proj-card .proj-name { font-size: 11px; color: var(--muted); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .proj-card .proj-score { font-size: 22px; font-weight: 700; }
  .proj-card .proj-meta { font-size: 10px; color: var(--muted); margin-top: 3px; }
  .proj-card .proj-phase { font-size: 10px; margin-top: 4px; }
  .proj-card .proj-model { font-size: 10px; color: var(--purple); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .proj-card .proj-progress { margin-top: 6px; }
  .proj-card .prog-bar-bg { background: var(--border); border-radius: 3px; height: 4px; overflow: hidden; }
  .proj-card .prog-bar-fill { height: 4px; border-radius: 3px; background: var(--blue); transition: width 0.4s; }
  .proj-card .prog-label { font-size: 10px; color: var(--muted); margin-top: 2px; }
  
  /* Left panel */
  .panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
  .panel-header { padding: 8px 12px; background: var(--bg3); border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .panel-body { flex: 1; overflow-y: auto; padding: 8px; }
  
  /* Model pool table */
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th { text-align: left; color: var(--muted); font-weight: 500; padding: 4px 6px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg2); }
  td { padding: 4px 6px; border-bottom: 1px solid #1a1f26; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .dot-green { background: var(--green); }
  .dot-red { background: var(--red); }
  .dot-yellow { background: var(--yellow); }
  .tier-0 { color: var(--green); }
  .tier-1 { color: var(--blue); }
  .tier-2 { color: var(--yellow); }
  .tier-3 { color: var(--orange); }
  
  /* Events feed */
  .event-item { padding: 5px 8px; border-bottom: 1px solid #1a1f26; font-family: monospace; font-size: 11px; line-height: 1.5; }
  .event-item:last-child { border-bottom: none; }
  .event-ts { color: var(--muted); margin-right: 6px; }
  .event-type { font-weight: 600; margin-right: 6px; }
  .ev-run_start { color: var(--blue); }
  .ev-run_done { color: var(--green); }
  .ev-run_error { color: var(--red); }
  .ev-cycle_start { color: var(--purple); }
  .ev-skip { color: var(--muted); }
  .ev-budget_wait { color: var(--yellow); }
  .ev-generator_spawn { color: var(--orange); }
  .ev-improve { color: var(--green); font-weight: 700; }
  .ev-discard { color: var(--muted); }
  .ev-baseline { color: var(--blue); }
  
  /* Call log */
  .call-row-ok { color: var(--green); }
  .call-row-err { color: var(--red); }
  .call-row-exhausted { color: var(--yellow); }
  .model-name { font-family: monospace; }
  
  /* Experiments */
  .exp-item { padding: 5px 8px; border-bottom: 1px solid #1a1f26; font-size: 11px; display: flex; align-items: center; gap: 8px; }
  .exp-item:last-child { border-bottom: none; }
  .exp-delta-up { color: var(--green); font-weight: 700; }
  .exp-delta-dn { color: var(--red); }
  .exp-delta-eq { color: var(--muted); }
  
  /* Score color helpers */
  .score-high { color: var(--green); }
  .score-mid  { color: var(--yellow); }
  .score-low  { color: var(--red); }
  
  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<header>
  <h1>🔬 Autoresearch</h1>
  <span id="engine-badge" class="badge badge-yellow">⏳ loading</span>
  <span id="gen-badge" class="badge badge-blue">generator</span>
  <span id="last-update"></span>
</header>

<div class="main">
  <!-- Budget bar -->
  <div class="budget-bar">
    <label>💰 Budget/day</label>
    <div class="progress-wrap"><div class="progress-fill" id="budget-fill" style="width:0%"></div></div>
    <div class="budget-num" id="budget-text">$0.00 / $0.50</div>
    <label style="margin-left:24px">📋 Tests</label>
    <div id="test-counts" style="font-size:11px;color:var(--muted)">loading...</div>
  </div>

  <!-- Project cards -->
  <div id="live-status-bar" style="grid-column:1/-1;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:11px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;min-height:32px"></div>
  <div class="projects-grid" id="projects-grid">
    <!-- filled by JS -->
  </div>

  <!-- Left: Model pool + call log -->
  <div class="panel">
    <div class="panel-header">
      🤖 Model Pool
      <span id="active-model-badge" style="margin-left:auto;font-size:11px;color:var(--purple)"></span>
    </div>
    <div class="panel-body" id="model-pool-body">loading...</div>
    <div class="panel-header" style="border-top:1px solid var(--border)">📞 Recent Calls (all projects)</div>
    <div style="max-height:200px;overflow-y:auto" id="call-log-body">—</div>
  </div>

  <!-- Right: Engine events + experiments -->
  <div class="panel">
    <div class="panel-header">⚙️ Engine Events</div>
    <div class="panel-body" id="engine-events-body" style="max-height:240px">loading...</div>
    <div class="panel-header" style="border-top:1px solid var(--border)">
      🧪 Experiments — <span id="active-proj-label" style="color:var(--blue)">select project</span>
    </div>
    <div style="flex:1;overflow-y:auto" id="experiments-body">—</div>
  </div>
</div>

<script>
const API = '';
let activeProject = 'contractai-prompts';
let allProjects = {};

function scoreClass(s) {
  if (s >= 0.7) return 'score-high';
  if (s >= 0.35) return 'score-mid';
  return 'score-low';
}

function phaseBadge(phase) {
  const map = {
    'running':'badge-green','evaluating':'badge-green','mutating':'badge-blue',
    'baseline':'badge-blue','waiting':'badge-yellow','initializing':'badge-yellow',
    'done':'badge-blue','error':'badge-red','paused':'badge-red'
  };
  const cls = map[phase] || 'badge-yellow';
  return `<span class="badge ${cls}">${phase||'?'}</span>`;
}

function fmtTime(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  } catch { return iso.slice(11,19); }
}

function fmtDelta(d) {
  if (d == null) return '<span class="exp-delta-eq">—</span>';
  if (d > 0) return `<span class="exp-delta-up">▲ +${(d*100).toFixed(1)}%</span>`;
  if (d < 0) return `<span class="exp-delta-dn">▼ ${(d*100).toFixed(1)}%</span>`;
  return '<span class="exp-delta-eq">= 0%</span>';
}

// ─── Projects grid ───────────────────────────────────────────────
function renderProjects(data) {
  allProjects = data;
  const grid = document.getElementById('projects-grid');
  grid.innerHTML = '';
  for (const [key, p] of Object.entries(data)) {
    const score = p.best_score || p.current_score || 0;
    const sc = scoreClass(score);
    const model = p.model || '—';
    const shortModel = model.split('/').pop().replace(':free','').slice(0,22);
    const isActive = key === activeProject;
    const qDone = p.current_question_id || 0;
    const qTotal = p.total_questions || 0;
    const pct = qTotal > 0 ? Math.round(qDone / qTotal * 100) : 0;
    const progHtml = qTotal > 0 ? `
      <div class="proj-progress">
        <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
        <div class="prog-label">Q${qDone}/${qTotal} · ${p.codex_calls||0} calls</div>
      </div>` : '';
    const curScore = p.current_score > 0 ? ` (live: ${(p.current_score*100).toFixed(0)}%)` : '';
    grid.innerHTML += `
      <div class="proj-card${isActive?' active':''}" onclick="selectProject('${key}')">
        <div class="proj-name">${p.project_name || key}</div>
        <div class="proj-score ${sc}">${(score*100).toFixed(1)}%<span style="font-size:11px;font-weight:400;color:var(--muted)">${curScore}</span></div>
        <div class="proj-meta">${p.experiment_count||0} exp · ${p.total_questions||0}q</div>
        <div class="proj-phase">${phaseBadge(p.phase)}</div>
        <div class="proj-model" title="${model}">${shortModel}</div>
        ${progHtml}
      </div>`;
  }
}

function selectProject(key) {
  activeProject = key;
  document.getElementById('active-proj-label').textContent = allProjects[key]?.project_name || key;
  fetchExperiments();
  renderProjects(allProjects);
}

// ─── Budget ──────────────────────────────────────────────────────
function renderBudget(data) {
  const spent = data.today_usd || 0;
  const cap = data.cap_usd || 0.5;
  const pct = Math.min(100, (spent/cap)*100);
  const fill = document.getElementById('budget-fill');
  fill.style.width = pct + '%';
  fill.className = 'progress-fill' + (pct>80?' over': pct>50?' warn':'');
  document.getElementById('budget-text').textContent = `$${spent.toFixed(4)} / $${cap.toFixed(2)}`;
}

// ─── Test counts ─────────────────────────────────────────────────
function renderTestCounts(data) {
  const parts = Object.entries(data).map(([k,v]) => `${k.replace('-skill','').replace('-prompts','').replace('-assistant','')}: ${v}`);
  document.getElementById('test-counts').textContent = parts.join(' · ');
}

// ─── Model pool ──────────────────────────────────────────────────
function renderModelPool(data) {
  const models = data.models || [];
  let html = '<table><thead><tr><th>Model</th><th>Provider</th><th>Role</th><th>Tier</th><th>Cost/1K</th><th>Status</th></tr></thead><tbody>';
  for (const m of models) {
    const exhausted = m.exhausted;
    const dot = `<span class="dot ${exhausted?'dot-red':'dot-green'}"></span>`;
    const tierCls = `tier-${m.tier}`;
    const cost = m.cost > 0 ? `$${m.cost}` : '<span style="color:var(--green)">FREE</span>';
    const shortId = m.id.replace(':free','').split('/').pop().slice(0,22);
    html += `<tr>
      <td class="model-name" title="${m.id}">${shortId}</td>
      <td style="color:var(--muted)">${m.provider}</td>
      <td style="color:var(--muted)">${m.role}</td>
      <td class="${tierCls}">T${m.tier}</td>
      <td>${cost}</td>
      <td>${dot}${exhausted?'<span style="color:var(--red)">exhausted</span>':'<span style="color:var(--green)">ready</span>'}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('model-pool-body').innerHTML = html;
}

// ─── Call log ────────────────────────────────────────────────────
function renderCallLog(entries) {
  if (!entries || !entries.length) { document.getElementById('call-log-body').innerHTML = '<div style="padding:8px;color:var(--muted);font-size:11px">No calls yet</div>'; return; }
  let html = '<table style="width:100%;font-size:11px"><thead><tr><th>Project</th><th>Model</th><th>Status</th><th>Cost</th></tr></thead><tbody>';
  for (const e of [...entries].reverse().slice(0,40)) {
    const st = e.status || 'ok';
    const cls = st === 'ok' ? 'call-row-ok' : st === 'exhausted' ? 'call-row-exhausted' : 'call-row-err';
    const shortModel = (e.model||'?').split('/').pop().replace(':free','').slice(0,20);
    const cost = e.cost > 0 ? `$${e.cost.toFixed(5)}` : 'free';
    html += `<tr class="${cls}"><td style="color:var(--muted)">${(e.project||'').slice(0,16)}</td><td class="model-name" title="${e.model}">${shortModel}</td><td>${st}</td><td>${cost}</td></tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('call-log-body').innerHTML = html;
}

// ─── Engine events ───────────────────────────────────────────────
function renderEngineEvents(entries) {
  if (!entries || !entries.length) { document.getElementById('engine-events-body').innerHTML = '<div style="padding:8px;color:var(--muted)">No events yet</div>'; return; }
  let html = '';
  for (const e of [...entries].reverse().slice(0,60)) {
    const cls = `ev-${e.event}`;
    const ts = fmtTime(e.ts);
    let detail = '';
    if (e.event === 'run_start') detail = `score=${e.score_before||0} exp=${e.experiments||0}`;
    else if (e.event === 'run_done') detail = `score=${e.score_after||0} Δ=${e.delta||0}`;
    else if (e.event === 'run_error') detail = `reason=${e.reason||'?'}`;
    else if (e.event === 'cycle_start') detail = `cycle #${e.cycle||'?'}`;
    else if (e.event === 'skip') detail = e.reason || '';
    else if (e.event === 'improve') detail = `${e.score_before}→${e.score_after}`;
    html += `<div class="event-item">
      <span class="event-ts">${ts}</span>
      <span class="event-type ${cls}">${e.event}</span>
      <span style="color:var(--blue)">${e.project||''}</span>
      ${detail ? `<span style="color:var(--muted);margin-left:6px">${detail}</span>` : ''}
    </div>`;
  }
  document.getElementById('engine-events-body').innerHTML = html;
}

// ─── Experiments ─────────────────────────────────────────────────
function renderExperiments(entries) {
  if (!entries || !entries.length) { document.getElementById('experiments-body').innerHTML = '<div style="padding:8px;color:var(--muted)">No experiments yet</div>'; return; }
  let html = '<table style="width:100%"><thead><tr><th>#</th><th>Score</th><th>Δ</th><th>Status</th><th>Time</th></tr></thead><tbody>';
  for (const e of [...entries].reverse().slice(0,50)) {
    const sc = scoreClass(e.score||0);
    const status = e.status || e.decision || '?';
    const stCls = status === 'kept' || status === 'baseline' ? 'badge-green' : status === 'discard' ? 'badge-red' : 'badge-yellow';
    html += `<tr>
      <td style="color:var(--muted)">${e.experiment ?? e.n ?? '?'}</td>
      <td class="${sc}">${((e.score||0)*100).toFixed(1)}%</td>
      <td>${fmtDelta(e.delta)}</td>
      <td><span class="badge ${stCls}" style="font-size:10px">${status}</span></td>
      <td style="color:var(--muted)">${fmtTime(e.timestamp||e.ts||'')}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('experiments-body').innerHTML = html;
}

// ─── Engine badge ────────────────────────────────────────────────
function updateEngineBadge(events) {
  const badge = document.getElementById('engine-badge');
  if (!events || !events.length) { badge.className='badge badge-red'; badge.textContent='⛔ no data'; return; }
  const last = events[events.length-1];
  const ageMs = Date.now() - new Date(last.ts).getTime();
  const ageMins = Math.floor(ageMs/60000);
  if (ageMs < 30*60000) {
    badge.className = 'badge badge-green';
    badge.textContent = `✅ running (${ageMins}m ago)`;
  } else {
    badge.className = 'badge badge-red';
    badge.textContent = `⛔ stalled ${ageMins}m`;
  }
}

// ─── Fetch helpers ───────────────────────────────────────────────
async function fetchAll() {
  try {
    const [proj, budget, tests, router, engine, callLog] = await Promise.all([
      fetch('/api/projects?_='+Date.now()).then(r=>r.json()),
      fetch('/api/budget?_='+Date.now()).then(r=>r.json()),
      fetch('/api/test_counts?_='+Date.now()).then(r=>r.json()),
      fetch('/api/router?_='+Date.now()).then(r=>r.json()),
      fetch('/api/engine?_='+Date.now()).then(r=>r.json()),
      fetch('/api/model_log?_='+Date.now()).then(r=>r.json()),
    ]);
    renderProjects(proj);
    renderBudget(budget);
    renderTestCounts(tests);
    renderModelPool(router);
    renderEngineEvents(engine);
    renderCallLog(callLog);
    updateEngineBadge(engine);
    document.getElementById('last-update').textContent = 'updated ' + new Date().toLocaleTimeString();
    // Live status bar
    const bar = document.getElementById('live-status-bar');
    const parts = [];
    for (const [key, p] of Object.entries(proj)) {
      const qDone = p.current_question_id || 0;
      const qTotal = p.total_questions || 0;
      if (qTotal > 0 && qDone > 0 && qDone < qTotal) {
        const shortName = (p.project_name||key).replace(' Prompts','').replace(' Skill','');
        const m = (p.model||'').split('/').pop().replace(':free','').slice(0,16);
        parts.push(`<span style="color:var(--blue)">▶ ${shortName}</span> <span style="color:var(--muted)">Q${qDone}/${qTotal}</span> <span style="color:var(--purple)">${m}</span>`);
      }
    }
    bar.innerHTML = parts.length ? parts.join('<span style="color:var(--border)"> | </span>') : '<span style="color:var(--muted)">engine idle / between runs</span>';
    // active model badge
    const running = Object.values(proj).find(p => (p.current_question_id||0) > 0 && (p.total_questions||0) > 0);
    if (running && running.model) {
      document.getElementById('active-model-badge').textContent = '▶ ' + running.model.split('/').pop().replace(':free','');
    }
  } catch(e) { console.error('fetch error', e); }
}

async function fetchExperiments() {
  try {
    const data = await fetch(`/api/experiments/${activeProject}?_=${Date.now()}`).then(r=>r.json());
    renderExperiments(data);
  } catch(e) { console.error('exp fetch error', e); }
}

// ─── Init ────────────────────────────────────────────────────────
document.getElementById('active-proj-label').textContent = activeProject;
fetchAll();
fetchExperiments();
setInterval(fetchAll, 4000);
setInterval(fetchExperiments, 6000);
</script>
</body>
</html>
